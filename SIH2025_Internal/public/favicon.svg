<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield background -->
  <path d="M50 10 L80 25 L80 50 Q80 75 50 90 Q20 75 20 50 L20 25 Z" fill="url(#grad)"/>
  
  <!-- Scale of justice -->
  <g fill="white">
    <!-- Center pole -->
    <rect x="48" y="30" width="4" height="35" rx="1"/>
    
    <!-- Base -->
    <rect x="40" y="63" width="20" height="3" rx="1"/>
    
    <!-- Horizontal bar -->
    <rect x="30" y="32" width="40" height="3" rx="1"/>
    
    <!-- Left scale -->
    <line x1="35" y1="33" x2="35" y2="43" stroke="white" stroke-width="2"/>
    <ellipse cx="35" cy="45" rx="8" ry="3" fill="white"/>
    
    <!-- Right scale -->
    <line x1="65" y1="33" x2="65" y2="43" stroke="white" stroke-width="2"/>
    <ellipse cx="65" cy="45" rx="8" ry="3" fill="white"/>
    
    <!-- IPC text -->
    <text x="50" y="75" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">IPC</text>
  </g>
</svg>
